<!DOCTYPE html>
<html lang="en" class="h-full">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Arxivore</title>
  <!-- No Node build step: Tailwind + Alpine load from CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script defer src="https://unpkg.com/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    [x-cloak] { display: none !important; }
    body { font-feature-settings: "cv11", "ss01"; }
    .mono { font-family: ui-monospace, "SFMono-Regular", Menlo, monospace; }
  </style>
</head>
<body class="h-full bg-slate-50 text-slate-800">
  <div x-data="mapper()" class="mx-auto max-w-5xl px-4 py-10">

    <!-- Header -->
    <header class="mb-8">
      <h1 class="text-3xl font-semibold tracking-tight text-slate-900">
        Arxivore
      </h1>
      <p class="mt-1 text-slate-500">
        Feed it a topic. It devours arXiv and hands you back a map of the field.
      </p>
    </header>

    <!-- Search -->
    <form @submit.prevent="search()" class="mb-8">
      <div class="flex gap-2">
        <input
          x-model="topic"
          type="text"
          placeholder="e.g. retrieval-augmented generation"
          :disabled="loading"
          class="flex-1 rounded-lg border border-slate-300 bg-white px-4 py-3 text-slate-900 shadow-sm outline-none focus:border-indigo-500 focus:ring-2 focus:ring-indigo-200 disabled:opacity-60"
        />
        <button
          type="submit"
          :disabled="loading || topic.trim().length < 3"
          class="rounded-lg bg-indigo-600 px-6 py-3 font-medium text-white shadow-sm transition hover:bg-indigo-700 disabled:cursor-not-allowed disabled:opacity-50"
        >
          <span x-show="!loading">Map it</span>
          <span x-show="loading" x-cloak>Mapping…</span>
        </button>
      </div>
      <!-- Example chips -->
      <div class="mt-3 flex flex-wrap gap-2 text-sm">
        <template x-for="ex in examples" :key="ex">
          <button type="button" @click="topic = ex; search()" :disabled="loading"
            class="rounded-full border border-slate-200 bg-white px-3 py-1 text-slate-600 transition hover:border-indigo-300 hover:text-indigo-700 disabled:opacity-50"
            x-text="ex"></button>
        </template>
      </div>
    </form>

    <!-- Loading -->
    <div x-show="loading" x-cloak class="mb-8 flex items-center gap-3 rounded-lg border border-indigo-100 bg-indigo-50 px-4 py-3 text-indigo-700">
      <svg class="h-5 w-5 animate-spin" viewBox="0 0 24 24" fill="none">
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v4a4 4 0 00-4 4H4z"></path>
      </svg>
      <span>Running the pipeline — retrieve → rerank → extract → synthesize. This can take a minute.</span>
    </div>

    <!-- Error -->
    <div x-show="error" x-cloak class="mb-8 rounded-lg border border-rose-200 bg-rose-50 px-4 py-3 text-rose-700" x-text="error"></div>

    <!-- Results -->
    <div x-show="result && !loading" x-cloak>

      <!-- Stats bar -->
      <div class="mb-6 flex flex-wrap gap-4 text-sm text-slate-500">
        <span><strong class="text-slate-800" x-text="result?.candidates_retrieved"></strong> retrieved</span>
        <span><strong class="text-slate-800" x-text="result?.papers_returned"></strong> ranked</span>
        <span x-show="result?.extract_errors > 0" class="text-amber-600">
          <strong x-text="result?.extract_errors"></strong> extraction error(s)
        </span>
        <span class="mono ml-auto text-xs text-slate-400"
          x-text="`retrieve ${result?.retrieve_ms}ms · rerank ${result?.rerank_ms}ms · extract ${result?.extract_ms}ms · synth ${result?.synthesize_ms}ms`"></span>
      </div>

      <!-- Landscape -->
      <template x-if="result?.landscape">
        <section class="mb-10">
          <h2 class="mb-4 text-xl font-semibold text-slate-900">Landscape</h2>

          <!-- Clusters -->
          <div class="grid gap-4 sm:grid-cols-2">
            <template x-for="c in result.landscape.clusters" :key="c.name">
              <div class="rounded-xl border border-slate-200 bg-white p-4 shadow-sm">
                <div class="flex items-baseline justify-between">
                  <h3 class="font-semibold text-indigo-700" x-text="c.name"></h3>
                  <span class="mono text-xs text-slate-400" x-text="`${c.arxiv_ids.length} papers`"></span>
                </div>
                <p class="mt-1 text-sm text-slate-600" x-text="c.summary"></p>
              </div>
            </template>
          </div>

          <!-- Relationships -->
          <template x-if="result.landscape.relationships?.length">
            <div class="mt-6">
              <h3 class="mb-2 text-sm font-semibold uppercase tracking-wide text-slate-400">Relationships</h3>
              <ul class="space-y-1 text-sm text-slate-600">
                <template x-for="(r, i) in result.landscape.relationships" :key="i">
                  <li>
                    <span class="font-medium text-slate-800" x-text="r.from_cluster"></span>
                    <span class="mono mx-1 rounded bg-slate-100 px-1.5 py-0.5 text-xs text-slate-500" x-text="r.kind"></span>
                    <span class="font-medium text-slate-800" x-text="r.to_cluster"></span>
                    — <span x-text="r.description"></span>
                  </li>
                </template>
              </ul>
            </div>
          </template>

          <!-- Tensions + Open problems -->
          <div class="mt-6 grid gap-6 sm:grid-cols-2">
            <template x-if="result.landscape.tensions?.length">
              <div>
                <h3 class="mb-2 text-sm font-semibold uppercase tracking-wide text-amber-600">Tensions</h3>
                <ul class="list-disc space-y-1 pl-5 text-sm text-slate-600">
                  <template x-for="(t, i) in result.landscape.tensions" :key="i">
                    <li x-text="t"></li>
                  </template>
                </ul>
              </div>
            </template>
            <template x-if="result.landscape.open_problems?.length">
              <div>
                <h3 class="mb-2 text-sm font-semibold uppercase tracking-wide text-emerald-600">Open problems</h3>
                <ul class="list-disc space-y-1 pl-5 text-sm text-slate-600">
                  <template x-for="(o, i) in result.landscape.open_problems" :key="i">
                    <li x-text="o"></li>
                  </template>
                </ul>
              </div>
            </template>
          </div>
        </section>
      </template>

      <!-- Papers -->
      <section x-show="result?.papers?.length">
        <h2 class="mb-4 text-xl font-semibold text-slate-900">Papers</h2>
        <div class="space-y-4">
          <template x-for="p in result.papers" :key="p.arxiv_id">
            <article class="rounded-xl border border-slate-200 bg-white p-5 shadow-sm">
              <div class="flex items-start justify-between gap-4">
                <a :href="p.url" target="_blank" rel="noopener"
                   class="font-semibold text-slate-900 hover:text-indigo-700" x-text="p.title"></a>
                <span x-show="p.relevance_score !== null"
                  class="mono shrink-0 rounded-full bg-indigo-50 px-2 py-0.5 text-xs font-medium text-indigo-700"
                  x-text="p.relevance_score?.toFixed(2)"></span>
              </div>
              <p class="mono mt-0.5 text-xs text-slate-400" x-text="p.arxiv_id"></p>

              <!-- Extraction (final result) -->
              <template x-if="p.extract_status === 'done'">
                <dl class="mt-3 grid gap-x-6 gap-y-2 text-sm sm:grid-cols-2">
                  <div><dt class="font-medium text-slate-500">Problem</dt><dd class="text-slate-700" x-text="p.problem"></dd></div>
                  <div><dt class="font-medium text-slate-500">Method</dt><dd class="text-slate-700" x-text="p.method"></dd></div>
                  <div><dt class="font-medium text-slate-500">Results</dt><dd class="text-slate-700" x-text="p.results"></dd></div>
                  <div><dt class="font-medium text-slate-500">Contribution</dt><dd class="text-slate-700" x-text="p.contribution"></dd></div>
                </dl>
              </template>
              <p x-show="p.extract_status === 'error'" class="mt-3 text-sm text-rose-500">Extraction failed for this paper.</p>
            </article>
          </template>
        </div>
      </section>
    </div>

    <footer class="mt-16 border-t border-slate-200 pt-6 text-center text-xs text-slate-400">
      Arxivore · arXiv + LLM · retrieve → rerank → extract → synthesize
    </footer>
  </div>

  <script>
    function mapper() {
      return {
        topic: "",
        loading: false,
        error: "",
        result: null,
        examples: [
          "retrieval-augmented generation",
          "diffusion policy learning",
          "state space models for language",
        ],
        async search() {
          const topic = this.topic.trim();
          if (topic.length < 3 || this.loading) return;
          this.loading = true;
          this.error = "";
          this.result = null;
          try {
            const res = await fetch("/api/search", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({ topic }),
            });
            if (!res.ok) {
              const data = await res.json().catch(() => ({}));
              throw new Error(data.detail || `Request failed (${res.status})`);
            }
            this.result = await res.json();
          } catch (e) {
            this.error = e.message || "Something went wrong.";
          } finally {
            this.loading = false;
          }
        },
      };
    }
  </script>
</body>
</html>
